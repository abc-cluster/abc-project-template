<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="abc favicon (light)">
  <!-- Compact favicon: trio rings rendered to read at 16-32px tab sizes.
       Slightly thicker stroke than the navbar logo for legibility at small sizes. -->
  <g fill="none" stroke="#2d7060" stroke-width="3">
    <circle cx="14" cy="32" r="10"/>
    <circle cx="32" cy="32" r="10"/>
    <circle cx="50" cy="32" r="10"/>
  </g>
  <g fill="#2d7060" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace"
     font-weight="700" font-size="13" text-anchor="middle" letter-spacing="-0.02em">
    <text x="14" y="36.5">A</text>
    <text x="32" y="36.5">B</text>
    <text x="50" y="36.5">C</text>
  </g>
</svg>
