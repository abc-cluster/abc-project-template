<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="abc-project-template ABC mark (dark)">
  <!-- Dark-theme navbar: gold trio rings on transparent ground.
       Uses the dark-mode accent `#c8a84c` so the mark sits naturally on the
       dark teal navbar. Mirrors abc-cluster-cli. -->
  <g fill="none" stroke="#c8a84c" stroke-width="2.2">
    <circle cx="14" cy="32" r="9"/>
    <circle cx="32" cy="32" r="9"/>
    <circle cx="50" cy="32" r="9"/>
  </g>
  <g fill="#c8a84c" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace"
     font-weight="700" font-size="11" text-anchor="middle" letter-spacing="-0.02em">
    <text x="14" y="35.9">A</text>
    <text x="32" y="35.9">B</text>
    <text x="50" y="35.9">C</text>
  </g>
</svg>
