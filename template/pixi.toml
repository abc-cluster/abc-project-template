# pixi.toml — abc-project-template environment management
#
# Core dependencies are minimal — just Python + essential data science tools.
# Add language stacks via pixi features (see [feature.*] sections below),
# or use the garden seeds: just grow lang:r  /  just grow lang:julia  etc.
#
# Quick reference:
#   pixi install               — install default (core) environment
#   pixi run -e r-analysis <cmd>   — run in the R environment
#   pixi run -e julia-env  <cmd>   — run in the Julia environment
#   pixi add <package>         — add to core
#   pixi add --feature r <package> — add to the R feature

[workspace]
channels = ["conda-forge", "bioconda", "r"]
name = "{{project_name}}"
platforms = ["linux-64", "osx-64"]

# ─── Core dependencies ────────────────────────────────────────────────────────
# Installed in the default environment. Keep this small.

[dependencies]
python     = ">=3.11,<3.12"
pandas     = ">=2.2,<3"
matplotlib = ">=3.10,<4"
seaborn    = ">=0.13,<0.14"
jupyterlab = ">=4.4,<5"
python-duckdb = ">=1.2,<2"
great_tables  = ">=0.14,<0.18"
cowpy      = "1.1.*"

[tasks]
start = "python scripts/python/hello.py"

# ─── R feature ────────────────────────────────────────────────────────────────
# Activate: pixi install -e r-analysis
# Or plant via: just grow lang:r  (adds packages from the lang:r seed)

[feature.r.dependencies]
r-base    = ">=4.3,<4.5"
r-renv    = ">=1.1"
r-ggplot2 = "*"
r-tidyverse = "*"
r-jsonlite  = "*"
r-yaml      = "*"

# ─── Julia feature ────────────────────────────────────────────────────────────
# Activate: pixi install -e julia-env
# Or plant via: just grow lang:julia

[feature.julia.dependencies]
julia = ">=1.10"

# ─── Clojure feature ──────────────────────────────────────────────────────────
# Activate: pixi install -e clojure-env
# Or plant via: just grow lang:clojure

[feature.clojure.dependencies]
openjdk = "==21"
clojure = ">=1.12"

# ─── .NET feature ─────────────────────────────────────────────────────────────
# Activate: pixi install -e dotnet-env
# Or plant via: just grow lang:dotnet

[feature.dotnet.dependencies]
dotnet = ">=9"

# ─── Bioinformatics feature ───────────────────────────────────────────────────
# Planted automatically by: just grow preset:bioinformatics
# Adds bioconda tools alongside the core Python stack.

[feature.bioinformatics.dependencies]
nextflow    = ">=24"
fastqc      = "*"
multiqc     = "*"
samtools    = "*"
bcftools    = "*"

# ─── ML / data science extended feature ──────────────────────────────────────
# For heavy ML workloads. Activate: pixi install -e ml-extended

[feature.ml.dependencies]
scikit-learn  = ">=1.5,<2"
xgboost       = ">=2"
ibis-duckdb   = ">=10.5,<11"
fastparquet   = ">=2024"

# ─── Environments ─────────────────────────────────────────────────────────────

[environments]
default         = { solve-group = "default" }
r-analysis      = { features = ["r"],           solve-group = "r" }
julia-env       = { features = ["julia"],        solve-group = "julia" }
clojure-env     = { features = ["clojure"],      solve-group = "clojure" }
dotnet-env      = { features = ["dotnet"],       solve-group = "dotnet" }
bioinformatics  = { features = ["bioinformatics"], solve-group = "bioinformatics" }
ml-extended     = { features = ["ml"],           solve-group = "ml" }
