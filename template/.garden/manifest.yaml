# Garden manifest — tracks planted components in this project.
# Generated by `just grow` and `just prune`. Edit indirectly via those commands.
#
# This file IS version-controlled — team members run `just garden replant` to
# materialize the same set of components from the seed bank.

template_version: "0.2.0"
template_source: "gh:abc-cluster/abc-project-template"

planted: []

# Components planted by default during scaffolding. Phase 3 wires
# `garden replant` into copier's _extra_tasks so the right components auto-grow
# based on the chosen project_type.
#
# Component IDs use `<category>:<name>` form. See template/.garden/components/
# for available components.
defaults_for_project_type:
  "Minimal Starter (notebooks + basic writeup)":
    - core:base

  "Full Academic Project (analysis + writeup)":
    - core:base
    - data:features
    - data:model-input
    - data:model-output
    - data:models
    - data:logs
    - data:benchmarks
    - data:publications
    - writeup:quarto
    - writeup:presentation
    - writeup:abstracts
    - writeup:poster
    - infra:env-setup
    - infra:workbench
    - pipelines:nextflow

  "Analysis Only (data science pipeline)":
    - core:base
    - data:features
    - data:model-input
    - data:model-output
    - data:models
    - data:logs
    - infra:env-setup

  "Manuscript Only (writing and publications)":
    - core:base
    - writeup:quarto
    - writeup:presentation
    - writeup:abstracts
    - writeup:poster
    - writeup:grants
    - writeup:book

  "Package Development (software/library)":
    - core:base
    - build:bazel
    - infra:env-setup

  "Custom (choose components manually)":
    - core:base
    # Custom mode: user grows the rest by hand (or runs `just grow preset:<name>`)

# Curated bundles. Plant via `just grow preset:<name>`.
# (Phase 3+ will add this support to garden.py)
presets:
  bioinformatics:
    description: "Nextflow pipelines + Quarto + ABC-cluster workbench for genomics research"
    components:
      - core:base
      - data:features
      - data:benchmarks
      - data:publications
      - pipelines:nextflow
      - writeup:quarto
      - infra:workbench   # also plants writeup:quarto via depends
      - writeup:presentation
      - writeup:abstracts

  ml-research:
    description: "ML pipeline with experiment tracking and model lifecycle"
    components:
      - core:base
      - data:features
      - data:model-input
      - data:model-output
      - data:models
      - data:logs
      - data:benchmarks
      - infra:dagger
      - infra:env-setup
      - writeup:presentation

  academic-writing:
    description: "Manuscript + grants + presentations + posters"
    components:
      - core:base
      - writeup:presentation
      - writeup:abstracts
      - writeup:poster
      - writeup:grants

  full-academic:
    description: "Everything except experimental subsystems (replicates current Full Academic Project)"
    components:
      - core:base
      - data:features
      - data:model-input
      - data:model-output
      - data:models
      - data:logs
      - data:backups
      - data:benchmarks
      - data:publications
      - data:external-validation
      - data:collaboration
      - writeup:presentation
      - writeup:abstracts
      - writeup:poster
      - writeup:grants
      - writeup:book
      - writeup:blog
      - writeup:report
      - infra:env-setup
      - infra:terraform
      - infra:dagger
      - pipelines:nextflow
      - pipelines:snakemake
