# .abc-workbench.yaml — ABC-cluster workbench session configuration
# Generated by: just grow infra:workbench
# Documentation: https://abc-cluster.github.io/docs/workbench

# Project identifier — used to tag workbench sessions and Nextflow runs.
# Set this to your project ID from `abc project list`.
project: "{{project_name}}"

# Default resource allocation for workbench sessions.
# These are soft defaults; you can override per-session with
#   abc workbench start --cores 4 --memory 8192
defaults:
  cores: 2
  memory_mb: 4096
  gpus: 0

# Idle timeout — workbench session auto-stops after this many seconds of
# inactivity (no active browser connection or terminal process).
# Default: 4 hours (14400 seconds). Reduce for cost control.
idle_timeout_secs: 14400

# IDE selection — only "quarto" is supported in abc-seed tier.
# abc-grove adds "jupyter" and "rstudio" options.
ide: "quarto"

# Data staging — set to true if your project uses DVC with a MinIO remote.
# When enabled, abc workbench start configures DVC remote from cluster credentials.
dvc_remote: false

# Telemetry — pipeline run metadata sent to abc-grove for reporting.
# Disable only if your institution's data governance policy requires it.
telemetry: true
