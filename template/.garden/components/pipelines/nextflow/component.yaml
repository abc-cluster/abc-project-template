post_grow_hint: |
  Created pipelines/nextflow/ scaffolding with investigations/ layout.

  Requires nextflow on PATH. To run with ABC-cluster:
    export ABC_HOST=<your-cluster-host>
    export ABC_TOKEN=<your-token>
    nextflow run hello-pipeline.nf -profile abc_nomad

  Tower profile is also available:
    nextflow run hello-pipeline.nf -profile tower
