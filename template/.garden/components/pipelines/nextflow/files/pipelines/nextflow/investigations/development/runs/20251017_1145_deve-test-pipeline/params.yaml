# Minimal Test Parameters
# For quick smoke tests with tiny datasets

# Input/Output
input: "../data/01_raw/test_sample.csv"
outdir: "./test_results"

# Pipeline Options
resume: false
help: false

# Resource Limits (minimal for testing)
max_cpus: 2
max_memory: "4.GB"
max_time: "1.h"

# Processing Options
publish_mode: "copy"
enable_validation: true
enable_qc: false  # Skip QC for speed

# Test-specific
sample_size: 10  # Tiny subset
skip_intensive_processes: true
dev_mode: true

# Investigation Tracking
investigation_id: null
researcher: "test-user"
project: "smoke-test"