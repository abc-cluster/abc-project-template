# Default Parameters
# Sensible defaults for most pipeline runs

# Input/Output
input: "../data/01_raw/*.csv"
outdir: "./results"

# Pipeline Options
resume: false
help: false

# Resource Limits
max_cpus: 16
max_memory: "64.GB"
max_time: "24.h"

# Processing Options
publish_mode: "copy"
enable_validation: true
enable_qc: true

# Experiment Tracking
experiment_id: null
researcher: "unknown"
project: "data-analysis"

# Add your pipeline-specific parameters below
# Example:
# sample_size: 1000
# min_quality: 20