_subdirectory: template

_exclude:
  - .pixi
  - .pixi/**
  - pixi.lock
  - "**/__pycache__"
  - "**/*.pyc"

# Basic Project Information
project_name:
  type: str
  help: What is your project name?

short_name:
  type: str
  help: What is your project's short name? (used for file naming)

description:
  type: str
  help: Brief description of the project
  default: A comprehensive data science analysis project

# Author Information
author_name:
  type: str
  help: Your name or team name
  default: "Your Name"

author_email:
  type: str
  help: Contact email for the project
  default: "your.email@example.com"

# === PROJECT STRUCTURE SELECTION ===
project_type:
  type: str
  help: What type of project are you creating?
  choices:
    - Minimal Starter (notebooks + basic writeup)
    - Full Academic Project (analysis + writeup)
    - Analysis Only (data science pipeline)
    - Manuscript Only (writing and publications)
    - Package Development (software/library)
    - Custom (choose components manually)
  default: Minimal Starter (notebooks + basic writeup)

# === PRINCIPAL FOLDER SELECTION ===
# These will be auto-calculated based on project_type
include_analysis:
  type: bool
  help: Include analysis folder (notebooks, scripts, data pipeline)
  default: true
  when: "{{ project_type == 'Custom (choose components manually)' }}"

include_writeup:
  type: bool
  help: Include writeup folder (manuscripts, presentations, grants, reports)
  default: true
  when: "{{ project_type == 'Custom (choose components manually)' }}"

include_infrastructure:
  type: bool
  help: Include infrastructure folder (Docker, cloud deployment, CI/CD)
  default: true
  when: "{{ project_type == 'Custom (choose components manually)' }}"

include_misc:
  type: bool
  help: Include misc folder (utilities, legacy code, experimental features)
  default: true
  when: "{{ project_type == 'Custom (choose components manually)' }}"

# Project Configuration
programming_language:
  type: str
  help: Primary programming language
  choices:
    - Python
    - R
    - Both
  default: Python

python_version:
  type: str
  help: Python version to use
  default: "3.11"
  when: "{{ programming_language in ['Python', 'Both'] }}"

# Analysis Components
include_eda_templates:
  type: bool
  help: Include exploratory data analysis templates
  default: true

include_statistical_analysis:
  type: bool
  help: Include statistical analysis templates
  default: true

include_ml_components:
  type: bool
  help: Include machine learning workflow templates
  default: true

# Data Management
data_versioning:
  type: bool
  help: Include DVC setup for data versioning
  default: false

data_validation:
  type: bool
  help: Include data validation frameworks (Great Expectations, Pandera)
  default: false

# Documentation and Reporting
documentation_format:
  type: str
  help: Primary documentation format
  choices:
    - Markdown
    - Jupyter Notebooks
    - Quarto
    - RMarkdown
  default: Jupyter Notebooks

include_publication_templates:
  type: bool
  help: Include academic publication templates
  default: false

# Experiment Tracking
experiment_tracking:
  type: str
  help: Experiment tracking platform
  choices:
    - None
    - MLflow
    - Weights & Biases
    - Neptune
  default: None

# CI/CD and Automation
github_actions:
  type: bool
  help: Add GitHub Actions workflows
  default: false

pre_commit_hooks:
  type: bool
  help: Configure pre-commit hooks for code quality
  default: false

# Deployment Options
include_deployment_templates:
  type: bool
  help: Include deployment templates (Docker, FastAPI, etc.)
  default: false

module_name:
  type: str
  help: Python module name (auto-generated from short_name)
  default: "{{ short_name|lower|replace(' ', '_')|replace('-', '_') }}"
  when: false  # Auto-generated, not user input

# === SUBCOMPONENT SELECTION FOR ANALYSIS ===
include_notebooks:
  type: bool
  help: Include structured notebook workflow (00-scratch to 10-iteration)
  default: true
  when: "{{ include_analysis }}"

include_scripts:
  type: bool
  help: Include production scripts directory (Python, R, shells)
  default: true
  when: "{{ include_analysis }}"

include_data_pipeline:
  type: bool
  help: Include data pipeline structure (01_raw to 08_reporting)
  default: true
  when: "{{ include_analysis }}"

include_testing:
  type: bool
  help: Include testing framework for data and models
  default: true
  when: "{{ include_analysis }}"

include_packages:
  type: bool
  help: Include local package development structure
  default: true
  when: "{{ include_analysis }}"

# === SUBCOMPONENT SELECTION FOR WRITEUP ===
include_manuscript:
  type: bool
  help: Include manuscript writing capabilities
  default: true
  when: "{{ include_writeup }}"

include_presentations:
  type: bool
  help: Include presentation templates and management
  default: true
  when: "{{ include_writeup }}"

include_grants:
  type: bool
  help: Include grant application management
  default: true
  when: "{{ include_writeup }}"

include_abstracts:
  type: bool
  help: Include abstract submission management
  default: true
  when: "{{ include_writeup }}"

include_posters:
  type: bool
  help: Include poster creation and management
  default: true
  when: "{{ include_writeup }}"

include_reports:
  type: bool
  help: Include technical report templates
  default: true
  when: "{{ include_writeup }}"

include_blog:
  type: bool
  help: Include blog post templates for informal writing
  default: true
  when: "{{ include_writeup }}"

# === INFRASTRUCTURE SUBCOMPONENTS ===
include_docker:
  type: bool
  help: Include Docker configuration
  default: true
  when: "{{ include_infrastructure }}"

include_cloud_deployment:
  type: bool
  help: Include cloud deployment templates (AWS, GCP, Azure)
  default: true
  when: "{{ include_infrastructure }}"

include_virtualization:
  type: bool
  help: Include VM and container orchestration
  default: true
  when: "{{ include_infrastructure }}"

include_automation:
  type: bool
  help: Include automation tools (GitHub Actions, etc.)
  default: true
  when: "{{ include_infrastructure }}"

# === VERSION CONTROL ENHANCEMENT ===
include_jujutsu:
  type: bool
  help: Include Jujutsu (jj) version control with Git backend for enhanced academic workflows
  default: false

include_fossil:
  type: bool
  help: Include Fossil SCM for self-contained archives and manuscript versioning
  default: false

use_hybrid_vcs:
  type: bool
  help: Use hybrid version control (Jujutsu + Fossil) for comprehensive research management
  default: false
  when: "{{ include_jujutsu and include_fossil }}"

# === AUTO-CONFIGURATION BASED ON PROJECT TYPE ===
# These variables auto-configure components based on the selected project_type

_computed_include_analysis:
  type: bool
  default: >
    {%- if project_type in ['Minimal Starter (notebooks + basic writeup)', 'Full Academic Project (analysis + writeup)', 'Analysis Only (data science pipeline)', 'Package Development (software/library)'] -%}
    true
    {%- elif project_type == 'Manuscript Only (writing and publications)' -%}
    false
    {%- else -%}
    {{ include_analysis }}
    {%- endif -%}
  when: false

_computed_include_writeup:
  type: bool
  default: >
    {%- if project_type in ['Minimal Starter (notebooks + basic writeup)', 'Full Academic Project (analysis + writeup)', 'Manuscript Only (writing and publications)'] -%}
    true
    {%- elif project_type in ['Analysis Only (data science pipeline)', 'Package Development (software/library)'] -%}
    false
    {%- else -%}
    {{ include_writeup }}
    {%- endif -%}
  when: false

_computed_include_infrastructure:
  type: bool
  default: >
    {%- if project_type == 'Full Academic Project (analysis + writeup)' -%}
    true
    {%- elif project_type in ['Minimal Starter (notebooks + basic writeup)', 'Analysis Only (data science pipeline)', 'Manuscript Only (writing and publications)', 'Package Development (software/library)'] -%}
    false
    {%- else -%}
    {{ include_infrastructure }}
    {%- endif -%}
  when: false

# === MINIMAL CONFIGURATION OVERRIDES ===
# For Minimal Starter, override complex features to be simpler

_minimal_notebooks_only:
  type: bool
  default: >
    {%- if project_type == 'Minimal Starter (notebooks + basic writeup)' -%}
    true
    {%- else -%}
    false
    {%- endif -%}
  when: false

_minimal_writeup_only:
  type: bool
  default: >
    {%- if project_type == 'Minimal Starter (notebooks + basic writeup)' -%}
    true
    {%- else -%}
    false
    {%- endif -%}
  when: false

# === FINAL COMPUTED VARIABLES FOR TEMPLATE STRUCTURE ===
# These combine user choices with auto-configuration logic
_final_include_analysis:
  type: bool
  default: >
    {%- if project_type == 'Custom (choose components manually)' -%}
    {{ include_analysis }}
    {%- elif project_type in ['Minimal Starter (notebooks + basic writeup)', 'Full Academic Project (analysis + writeup)', 'Analysis Only (data science pipeline)', 'Package Development (software/library)'] -%}
    true
    {%- elif project_type == 'Manuscript Only (writing and publications)' -%}
    false
    {%- else -%}
    false
    {%- endif -%}
  when: false

_final_include_writeup:
  type: bool
  default: >
    {%- if project_type == 'Custom (choose components manually)' -%}
    {{ include_writeup }}
    {%- elif project_type in ['Minimal Starter (notebooks + basic writeup)', 'Full Academic Project (analysis + writeup)', 'Manuscript Only (writing and publications)'] -%}
    true
    {%- elif project_type in ['Analysis Only (data science pipeline)', 'Package Development (software/library)'] -%}
    false
    {%- else -%}
    false
    {%- endif -%}
  when: false

_final_include_infrastructure:
  type: bool
  default: >
    {%- if project_type == 'Custom (choose components manually)' -%}
    {{ include_infrastructure }}
    {%- elif project_type == 'Full Academic Project (analysis + writeup)' -%}
    true
    {%- elif project_type in ['Minimal Starter (notebooks + basic writeup)', 'Analysis Only (data science pipeline)', 'Manuscript Only (writing and publications)', 'Package Development (software/library)'] -%}
    false
    {%- else -%}
    false
    {%- endif -%}
  when: false

_final_include_misc:
  type: bool
  default: >
    {%- if project_type == 'Custom (choose components manually)' -%}
    {{ include_misc }}
    {%- else -%}
    true
    {%- endif -%}
  when: false

# === MIGRATION TASKS FOR AUTOMATIC CLEANUP ===
# These tasks run during copier update to remove files/folders based on conditions
_tasks:
  - |
    # Phase 3.5+: top-level wrappers (analysis/, writeup/, infrastructure/, misc/)
    # are obsolete. Active root is now flat (notebooks/, data/, src/, infra/...) and
    # selective component installation is handled by `garden replant` (next task).
    # Below: only post-render cleanups that aren't covered by Garden remain (DVC,
    # language-specific files, CI tooling).
    true
    
    # Remove Docker files if Docker is not included
    {% if not include_docker or not _final_include_infrastructure %}
    if [ -f "Dockerfile" ]; then
      echo "🗑️  Removing Docker files (Docker not enabled)..."
      rm -f Dockerfile
      rm -f docker-compose.yml
      rm -f .dockerignore
    fi
    {% endif %}
    
    # Remove DVC files if data versioning is disabled
    {% if not data_versioning %}
    if [ -f ".dvc/config" ]; then
      echo "🗑️  Removing DVC configuration (data versioning disabled)..."
      rm -rf .dvc
      rm -f dvc.yaml
      rm -f dvc.lock
      rm -f .dvcignore
    fi
    {% endif %}
    
    # Remove pre-commit config if disabled
    {% if not pre_commit_hooks %}
    if [ -f ".pre-commit-config.yaml" ]; then
      echo "🗑️  Removing pre-commit configuration (pre-commit hooks disabled)..."
      rm -f .pre-commit-config.yaml
    fi
    {% endif %}
    
    # Remove GitHub Actions if disabled
    {% if not github_actions %}
    if [ -d ".github/workflows" ]; then
      echo "🗑️  Removing GitHub Actions workflows (GitHub Actions disabled)..."
      rm -rf .github/workflows
      # Remove .github directory if empty
      [ -d ".github" ] && [ ! "$(ls -A .github)" ] && rmdir .github
    fi
    {% endif %}
    
    # Remove language-specific files based on programming language choice
    {% if programming_language == 'Python' %}
    # Remove R-specific files when Python-only
    if [ -f "renv.lock" ] || [ -f "DESCRIPTION" ]; then
      echo "🗑️  Removing R-specific files (Python-only project)..."
      rm -f renv.lock
      rm -f DESCRIPTION
      rm -f .Rprofile
      rm -rf renv/
      rm -f *.Rproj
    fi
    {% elif programming_language == 'R' %}
    # Remove Python-specific files when R-only
    if [ -f "pyproject.toml" ] && ! grep -q "\[tool.poetry\]" pyproject.toml 2>/dev/null; then
      echo "🗑️  Removing Python-specific files (R-only project)..."
      rm -f requirements.txt
      rm -f requirements-dev.txt
      rm -f .python-version
      rm -f uv.lock
      # Keep pyproject.toml if it has other tool configurations
      if [ -f "pyproject.toml" ]; then
        if ! grep -q "\[tool\." pyproject.toml; then
          rm -f pyproject.toml
        fi
      fi
    fi
    {% endif %}
    
    # Remove experiment tracking files if disabled
    {% if experiment_tracking == 'None' %}
    if [ -f "mlflow.yml" ] || [ -d "mlruns" ]; then
      echo "🗑️  Removing experiment tracking files (experiment tracking disabled)..."
      rm -f mlflow.yml
      rm -rf mlruns/
      rm -f wandb.yaml
      rm -f neptune.yaml
    fi
    {% endif %}
    
    # Remove version control files based on selection
    {% if not include_jujutsu %}
    if [ -f ".jjconfig.toml" ]; then
      echo "🗑️  Removing Jujutsu configuration (Jujutsu not enabled)..."
      rm -f .jjconfig.toml
    fi
    {% endif %}
    
    {% if not include_fossil %}
    if [ -f "_FOSSIL_" ]; then
      echo "🗑️  Removing Fossil repository (Fossil not enabled)..."
      rm -f _FOSSIL_
      rm -f .fslckout
    fi
    {% endif %}
    
    # Remove deployment templates if not included
    {% if not include_deployment_templates %}
    if [ -d "deployment" ]; then
      echo "🗑️  Removing deployment templates (deployment not enabled)..."
      rm -rf deployment/
    fi
    {% endif %}
    
    # Clean up specific analysis subcomponents
    {% if _final_include_analysis %}
      # Remove notebooks if not included
      {% if not include_notebooks %}
      if [ -d "analysis/notebooks" ]; then
        echo "🗑️  Removing notebooks directory (notebooks not enabled)..."
        rm -rf analysis/notebooks/
      fi
      {% endif %}
      
      # Remove scripts if not included  
      {% if not include_scripts %}
      if [ -d "analysis/scripts" ]; then
        echo "🗑️  Removing scripts directory (scripts not enabled)..."
        rm -rf analysis/scripts/
      fi
      {% endif %}
      
      # Remove data pipeline if not included
      {% if not include_data_pipeline %}
      if [ -d "analysis/data" ]; then
        echo "🗑️  Removing data pipeline directory (data pipeline not enabled)..."
        rm -rf analysis/data/
      fi
      {% endif %}
      
      # Remove packages if not included
      {% if not include_packages %}
      if [ -d "analysis/packages" ]; then
        echo "🗑️  Removing packages directory (local packages not enabled)..."
        rm -rf analysis/packages/
      fi
      {% endif %}
      
      # Remove testing if not included
      {% if not include_testing %}
      if [ -d "analysis/tests" ]; then
        echo "🗑️  Removing tests directory (testing not enabled)..."
        rm -rf analysis/tests/
      fi
      {% endif %}
    {% endif %}
    
    # Clean up specific writeup subcomponents
    {% if _final_include_writeup %}
      # Remove manuscript if not included
      {% if not include_manuscript %}
      if [ -d "writeup/manuscript" ]; then
        echo "🗑️  Removing manuscript directory (manuscript not enabled)..."
        rm -rf writeup/manuscript/
      fi
      {% endif %}
      
      # Remove presentations if not included
      {% if not include_presentations %}
      if [ -d "writeup/presentation" ]; then
        echo "🗑️  Removing presentation directory (presentations not enabled)..."
        rm -rf writeup/presentation/
      fi
      {% endif %}
      
      # Remove grants if not included
      {% if not include_grants %}
      if [ -d "writeup/grants" ]; then
        echo "🗑️  Removing grants directory (grants not enabled)..."
        rm -rf writeup/grants/
      fi
      {% endif %}
      
      # Remove abstracts if not included
      {% if not include_abstracts %}
      if [ -d "writeup/abstracts" ]; then
        echo "🗑️  Removing abstracts directory (abstracts not enabled)..."
        rm -rf writeup/abstracts/
      fi
      {% endif %}
      
      # Remove posters if not included
      {% if not include_posters %}
      if [ -d "writeup/posters" ]; then
        echo "🗑️  Removing posters directory (posters not enabled)..."
        rm -rf writeup/posters/
      fi
      {% endif %}
      
      # Remove reports if not included
      {% if not include_reports %}
      if [ -d "writeup/reports" ]; then
        echo "🗑️  Removing reports directory (reports not enabled)..."
        rm -rf writeup/reports/
      fi
      {% endif %}
      
      # Remove blog if not included
      {% if not include_blog %}
      if [ -d "writeup/blog" ]; then
        echo "🗑️  Removing blog directory (blog not enabled)..."
        rm -rf writeup/blog/
      fi
      {% endif %}
    {% endif %}
    
    # Clean up infrastructure subcomponents
    {% if _final_include_infrastructure %}
      # Remove cloud deployment if not included
      {% if not include_cloud_deployment %}
      if [ -d "infra/cloud" ]; then
        echo "🗑️  Removing cloud deployment directory (cloud deployment not enabled)..."
        rm -rf infrastructure/cloud/
      fi
      {% endif %}
      
      # Remove virtualization if not included
      {% if not include_virtualization %}
      if [ -d "infra/virtualization" ]; then
        echo "🗑️  Removing virtualization directory (virtualization not enabled)..."
        rm -rf infrastructure/virtualization/
      fi
      {% endif %}
      
      # Remove automation if not included
      {% if not include_automation %}
      if [ -d "infra/automation" ]; then
        echo "🗑️  Removing automation directory (automation not enabled)..."
        rm -rf infrastructure/automation/
      fi
      {% endif %}
    {% endif %}
    
    echo "✅ Cleanup completed based on current configuration"


  - |
    # Plant components based on project_type (Garden machinery — see .garden/)
    if [ -f .garden/garden.py ] && command -v python3 >/dev/null 2>&1; then
      python3 .garden/garden.py replant --verbose || true
    fi
